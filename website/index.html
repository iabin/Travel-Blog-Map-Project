<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travel Blog Map</title>

        <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.css" />
        <link rel="stylesheet" href="./libs/css/bootstrap.min.css" crossorigin="anonymous" />
        <link rel="stylesheet" href="./css/styles.css" />

        <script src="https://unpkg.com/maplibre-gl@5.12.0/dist/maplibre-gl.js"></script>
        <script src="./libs/js/bootstrap.min.js" crossorigin="anonymous" defer></script>
        <script type="module" src="./js/main.js"></script>
    </head>
    <body>
        <div id="map"></div>
        <div id="map-status" class="map-status" aria-live="polite">Loading globe...</div>

        <div id="stats" class="map-overlay card" aria-live="polite">
            <div class="card-body">
                <h6 class="card-title mb-2">Map stats</h6>
                <div class="d-flex justify-content-between"><span>Countries</span><strong id="stat-countries">–</strong></div>
                <div class="d-flex justify-content-between"><span>Places</span><strong id="stat-places">–</strong></div>
            </div>
        </div>
    </body>
</html>
